<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chibuzor Okoye — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-avatar" src="./assets/splash-avatar.png" alt="Chibuzor Okoye" />
          <div class="brand-badge">
            <span>Chibuzor Okoye</span>
          </div>
          <p class="brand-tagline">Events & Tickets</p>
          <p class="brand-sub">Organizer panel</p>
        </div>

        <button class="nav-btn active" data-route="dashboard">Dashboard</button>
        <button class="nav-btn" data-route="events">Events</button>
        <button class="nav-btn" data-route="orders">Orders</button>
        <button class="nav-btn" data-route="tickets">Tickets</button>
        <button class="nav-btn" data-route="returns">Returns</button>
        <button class="nav-btn" data-route="sales">Sales & Analytics</button>
        <button class="nav-btn nav-cta" data-route="create">+ Create event</button>

        <div class="sidebar-footer">
          Connected to database — all data synced via API.
        </div>
      </aside>

      <main class="main" id="main"></main>
    </div>

    <div class="toast" id="toast"></div>

    <div class="modal-overlay image-lightbox-overlay" id="image-lightbox" hidden>
      <button type="button" class="image-lightbox-close" id="image-lightbox-close" aria-label="Close">×</button>
      <div class="image-lightbox-wrap">
        <img id="image-lightbox-img" src="" alt="" />
        <p id="image-lightbox-caption" class="image-lightbox-caption" hidden></p>
      </div>
    </div>

    <div class="modal-overlay" id="delete-modal" hidden>
      <div class="modal delete-modal">
        <button type="button" class="modal-close delete-modal-close" id="delete-modal-close" aria-label="Close">×</button>
        <div class="delete-modal-icon" aria-hidden="true">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="3 6 5 6 21 6"></polyline>
            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
        <h3 class="delete-modal-heading">Delete event?</h3>
        <p class="delete-modal-title" id="delete-modal-title"></p>
        <p class="delete-modal-meta" id="delete-modal-meta"></p>
        <p class="modal-desc" id="delete-modal-desc">
          This will permanently remove the event from the catalog. This action cannot be undone.
        </p>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="delete-modal-cancel">Cancel</button>
          <button type="button" class="btn btn-danger" id="delete-modal-confirm">Delete event</button>
        </div>
      </div>
    </div>

    <div class="modal-overlay" id="return-modal" hidden>
      <div class="modal">
        <div class="modal-head">
          <h3 id="return-modal-title">Return ticket</h3>
          <button type="button" class="modal-close" id="return-modal-close" aria-label="Close">×</button>
        </div>
        <p class="modal-desc" id="return-modal-desc"></p>
        <label class="field">
          <span>Reason</span>
          <select id="return-reason"></select>
        </label>
        <div class="modal-actions">
          <button type="button" class="btn btn-ghost" id="return-modal-cancel">Cancel</button>
          <button type="button" class="btn btn-danger" id="return-modal-confirm">Confirm return</button>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
